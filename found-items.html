<!DOCTYPE html>
<html>
<head>
<title>Found Items</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-500 to-purple-600 min-h-screen">

<div class="max-w-5xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6 text-white">
Campus Lost & Found
</h1>

<input id="search"
placeholder="Search item name..."
oninput="loadItems()"
class="w-full border p-2 rounded mb-6">

<h2 class="text-xl font-bold text-white mb-3">
Found Items
</h2>

<div id="foundItems"
class="bg-white p-4 rounded shadow space-y-4 mb-6 max-h-[300px] overflow-y-auto">
</div>
<h2 class="text-xl font-bold text-white mb-3">
Lost Items Reported
</h2>

<div id="lostItems"
class="bg-white p-4 rounded shadow space-y-4 max-h-[300px] overflow-y-auto">
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/env.js"></script>
<script src="js/app.js"></script>

<!-- Toast Message -->
<div id="toast"
class="fixed bottom-5 right-5 px-4 py-2 rounded text-white bg-green-500 opacity-0 transition-opacity duration-300 pointer-events-none">
Message
</div>
</body>
</html>
