<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-500 to-purple-600 min-h-screen">

<div class="max-w-5xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6 text-white">
Student Dashboard
</h1>

<div class="flex gap-4 mb-6">

<a href="report-lost.html"
class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded">
Report Lost Item
</a>

<a href="found-items.html"
class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded">
View Found Items
</a>

<button onclick="logout()"
class="ml-auto bg-gray-700 hover:bg-gray-800 text-white px-4 py-2 rounded">
Logout
</button>

</div>

<div class="bg-white p-6 rounded shadow">

<h2 class="text-xl font-bold mb-4">
Report Found Item
</h2>

<input id="title" placeholder="Item Name"
class="w-full border p-2 mb-3 rounded">

<input id="location" placeholder="Where Found"
class="w-full border p-2 mb-3 rounded">

<textarea id="description"
placeholder="Description"
class="w-full border p-2 mb-3 rounded"></textarea>

<input type="file" id="photo"
class="w-full border p-2 mb-4 rounded">

<button onclick="addFoundItem()"
class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded w-full">
Submit
</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/env.js"></script>
<script src="js/app.js"></script>


<!-- Toast Message -->
<div id="toast"
class="fixed bottom-5 right-5 px-4 py-2 rounded text-white bg-green-500 opacity-0 transition-opacity duration-300 pointer-events-none">
Message
</div>
</body>
</html>
