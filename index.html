<!DOCTYPE html>
<html>
<head>
<title>Campus Lost & Found</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-500 to-purple-600 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-xl p-8 w-96">

<h1 class="text-2xl font-bold text-center mb-2">
Campus Lost & Found
</h1>

<p class="text-center text-gray-500 mb-6">
Login using your college email
</p>

<input id="email"
type="email"
placeholder="College Email"
class="w-full border p-2 mb-4 rounded">

<div class="relative mb-4">

<input id="password"
type="password"
placeholder="Password"
class="w-full border p-2 pr-10 rounded">

<button type="button"
onclick="togglePassword()"
class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500">
🔒
</button>

</div>

<button onclick="login()"
class="bg-blue-500 hover:bg-blue-600 text-white w-full py-2 rounded mb-3">
Login
</button>

<p class="text-center text-sm mb-4">
New Student?
<a href="register.html" class="text-blue-500">Register</a>
</p>

<a href="found-items.html"
class="block text-center bg-green-500 hover:bg-green-600 text-white py-2 rounded">
View Found Items
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/env.js"></script>
<script src="js/app.js"></script>

<script>
function togglePassword(){
const input = document.getElementById("password")
input.type = input.type === "password" ? "text" : "password"
}
</script>

<!-- Toast Message -->
<div id="toast"
class="fixed bottom-5 right-5 px-4 py-2 rounded text-white bg-green-500 opacity-0 transition-opacity duration-300 pointer-events-none">
Message
</div>
</body>
</html>
